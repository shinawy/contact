<style>
  :root{
    --bg:#f4f6f6;
    --panel:#ffffff;
    --ink:#15191e;
    --muted:#5f6a72;
    --line:#e2e7e8;
    --accent:#0f5e5a;       /* deep teal */
    --accent-soft:#e4efee;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    display:flex;
    justify-content:center;
    padding:32px 18px 56px;
    min-height:100vh;
  }
  .card{
    width:100%;
    max-width:420px;
  }
  header{
    margin-bottom:26px;
  }
  .avatar{
    width:88px;
    height:88px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:0 0 14px;
    border:3px solid var(--panel);
    box-shadow:0 2px 10px rgba(21,25,30,.12);
  }
  .name{
    font-size:1.7rem;
    font-weight:650;
    letter-spacing:-0.02em;
    margin:0 0 6px;
  }
  .title{
    margin:0;
    color:var(--ink);
    font-size:.98rem;
  }
  .affil{
    margin:4px 0 0;
    color:var(--muted);
    font-size:.86rem;
  }
  .rule{
    height:2px;
    width:44px;
    background:var(--accent);
    margin:16px 0 0;
    border-radius:2px;
  }
  ul.links{list-style:none;margin:0;padding:0}
  li{margin:10px 0}
  a.row{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color:var(--ink);
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:12px 14px;
    transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;
  }
  a.row:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 14px rgba(15,94,90,.10)}
  a.row:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .icon{
    width:40px;
    height:40px;
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--accent-soft);
    color:var(--accent);
    border-radius:10px;
    transition:background .15s ease, color .15s ease;
  }
  a.row:hover .icon{background:var(--accent);color:#fff}
  .icon svg{width:22px;height:22px;fill:currentColor;display:block}
  .lbl{font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .arrow{margin-left:auto;color:var(--muted);flex:0 0 auto}
  button.save{
    margin-top:22px;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    border:none;
    background:var(--accent);
    color:#fff;
    font-size:.95rem;
    font-weight:600;
    padding:14px;
    border-radius:var(--radius);
    cursor:pointer;
    font-family:inherit;
    transition:opacity .15s ease;
  }
  button.save svg{width:18px;height:18px;fill:currentColor}
  button.save:hover{opacity:.9}
  button.save:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  footer{margin-top:20px;text-align:center;color:var(--muted);font-size:.74rem}
  @media (prefers-reduced-motion:reduce){
    a.row,button.save,.icon{transition:none}
  }
</style>
</head>
<body>
  <main class="card">
    <header>
      <img class="avatar" id="js-photo" alt="" style="display:none">
      <h1 class="name" id="js-name"></h1>
      <p class="title" id="js-title"></p>
      <p class="affil" id="js-affil"></p>
      <div class="rule"></div>
    </header>

    <ul class="links" id="js-links"></ul>

    <button class="save" id="js-save" type="button"></button>

    <footer id="js-foot"></footer>
  </main>

<script>

    CV:           '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm4 12H8v-.75c0-1.33 2.67-2 4-2s4 .67 4 2V18z"/></svg>',

    GITHUB:       '<svg viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>',
    LINKEDIN:     '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>',
    TWITTER:      '<svg viewBox="0 0 24 24"><path d="M14.234 10.162 22.977 0h-2.072l-7.591 8.824L7.251 0H.258l9.168 13.343L.258 24H2.33l8.016-9.318L16.749 24h6.993zm-2.837 3.299-.929-1.329L3.076 1.56h3.182l5.965 8.532.929 1.329 7.754 11.09h-3.182z"/></svg>',
    BLUESKY:      '<svg viewBox="0 0 24 24"><path d="M5.202 2.857C7.954 4.922 10.913 9.11 12 11.358c1.087-2.247 4.046-6.436 6.798-8.501C20.783 1.366 24 .213 24 3.883c0 .732-.42 6.156-.667 7.037-.856 3.061-3.978 3.842-6.755 3.37 4.854.826 6.089 3.562 3.422 6.299-5.065 5.196-7.28-1.304-7.847-2.97-.104-.305-.152-.448-.153-.327 0-.121-.05.022-.153.327-.568 1.666-2.782 8.166-7.847 2.97-2.667-2.737-1.432-5.473 3.422-6.3-2.777.473-5.899-.308-6.755-3.369C.42 10.04 0 4.615 0 3.883c0-3.67 3.217-2.517 5.202-1.026"/></svg>',

  };

  (function(){
    document.title = CARD.name;
    document.getElementById("js-name").textContent  = CARD.name;
    document.getElementById("js-title").textContent = CARD.title || "";
    document.getElementById("js-affil").textContent = CARD.affiliation || "";
    document.getElementById("js-foot").textContent  = CARD.name;

    if(CARD.photo){
      const ph = document.getElementById("js-photo");
      ph.src = CARD.photo;
      ph.alt = CARD.name;
      ph.style.display = "block";
    }

    function iconFor(tag){ return ICONS[tag] || ICONS.WEBSITE; }

    const list = document.getElementById("js-links");
    (CARD.links || []).forEach(function(item){
      const li = document.createElement("li");
      const a  = document.createElement("a");
      a.className = "row";
      a.href = item.url;
      a.setAttribute("aria-label", item.tag + ": " + item.label);
      if(!item.url.startsWith("mailto:") && !item.url.startsWith("tel:")){ a.target="_blank"; a.rel="noopener"; }
      const lbl = document.createElement("span");
      lbl.className = "lbl";
      lbl.textContent = item.label;
      a.innerHTML =
        '<span class="icon" aria-hidden="true">'+iconFor(item.tag)+'</span>';
      a.appendChild(lbl);
      a.insertAdjacentHTML("beforeend", '<span class="arrow" aria-hidden="true">→</span>');
      li.appendChild(a);
      list.appendChild(li);
    });

    // vCard download — works offline once the page is open
    const btn = document.getElementById("js-save");
    btn.innerHTML = ICONS.SAVE + '<span>Save contact</span>';
    const v = CARD.vcard || {};
    if(!v.email && !v.phone){ btn.style.display="none"; }
    async function photoLine(){
      if(!CARD.photo) return null;
      try{
        const resp = await fetch(CARD.photo);
        const blob = await resp.blob();
        const b64  = await new Promise(function(res,rej){
          const r = new FileReader();
          r.onloadend = function(){ res(String(r.result).split(",")[1]); };
          r.onerror = rej;
          r.readAsDataURL(blob);
        });
        const type = (blob.type.split("/")[1] || "jpeg").toUpperCase();
        return "PHOTO;ENCODING=b;TYPE="+type+":"+b64;
      }catch(e){ return null; }
    }
    btn.addEventListener("click", async function(){
      const lines = ["BEGIN:VCARD","VERSION:3.0","FN:"+CARD.name];
      if(CARD.title) lines.push("TITLE:"+CARD.title);
      if(CARD.affiliation) lines.push("ORG:"+CARD.affiliation);
      if(v.email) lines.push("EMAIL:"+v.email);
      if(v.phone) lines.push("TEL:"+v.phone);
      (CARD.links||[]).forEach(function(i){
        if(!i.url.startsWith("mailto:") && !i.url.startsWith("tel:")) lines.push("URL:"+i.url);
      });
      const pl = await photoLine();
      if(pl) lines.push(pl);
      lines.push("END:VCARD");
      const blob = new Blob([lines.join("\r\n")], {type:"text/vcard"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = CARD.name.replace(/\s+/g,"_")+".vcf";
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    });
  })();
</script>
</body>
</html>
