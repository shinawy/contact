  affiliation: "Lab / Group · Semmelweis University",
  links: [

<style>
  :root{
    --bg:#f4f6f6;
    --panel:#ffffff;
    --ink:#15191e;
    --muted:#5f6a72;
    --line:#e2e7e8;
    --accent:#0f5e5a;       /* deep teal */
    --accent-soft:#e4efee;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    display:flex;
    justify-content:center;
    padding:32px 18px 56px;
    min-height:100vh;
  }
  .card{
    width:100%;
    max-width:420px;
  }
  header{
    margin-bottom:26px;
  }
  .name{
    font-size:1.7rem;
    font-weight:650;
    letter-spacing:-0.02em;
    margin:0 0 6px;
  }
  .title{
    margin:0;
    color:var(--ink);
    font-size:.98rem;
  }
  .affil{
    margin:4px 0 0;
    color:var(--muted);
    font-size:.86rem;
  }
  .rule{
    height:2px;
    width:44px;
    background:var(--accent);
    margin:16px 0 0;
    border-radius:2px;
  }
  ul.links{list-style:none;margin:0;padding:0}
  li{margin:10px 0}
  a.row{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color:var(--ink);
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:12px 14px;
    transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;
  }
  a.row:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 14px rgba(15,94,90,.08)}
  a.row:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .icon{
    width:40px;
    height:40px;
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--accent-soft);
    color:var(--accent);
    border-radius:10px;
    transition:background .15s ease, color .15s ease;
  }
  a.row:hover .icon{background:var(--accent);color:#fff}
  .icon svg{width:22px;height:22px;fill:currentColor;display:block}
  .lbl{font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .arrow{margin-left:auto;color:var(--muted);flex:0 0 auto}
  button.save{
    margin-top:22px;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    border:none;
    background:var(--accent);
    color:#fff;
    font-size:.95rem;
    font-weight:600;
    padding:14px;
    border-radius:var(--radius);
    cursor:pointer;
    font-family:inherit;
    transition:opacity .15s ease;
  }
  button.save svg{width:18px;height:18px;fill:currentColor}
  button.save:hover{opacity:.9}
  button.save:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  footer{margin-top:20px;text-align:center;color:var(--muted);font-size:.74rem}
  @media (prefers-reduced-motion:reduce){
    a.row,button.save,.icon{transition:none}
  }
</style>
</head>
<body>
  <main class="card">
    <header>
      <h1 class="name" id="js-name"></h1>
      <p class="title" id="js-title"></p>
      <p class="affil" id="js-affil"></p>
      <div class="rule"></div>
    </header>

    <ul class="links" id="js-links"></ul>

    <button class="save" id="js-save" type="button"></button>

    <footer id="js-foot"></footer>
  </main>

  (function(){
    document.title = CARD.name;
    document.getElementById("js-name").textContent  = CARD.name;
    document.getElementById("js-title").textContent = CARD.title || "";
    document.getElementById("js-affil").textContent = CARD.affiliation || "";
    document.getElementById("js-foot").textContent  = CARD.name;

    function iconFor(tag){ return ICONS[tag] || ICONS.WEBSITE; }

    const list = document.getElementById("js-links");
    (CARD.links || []).forEach(function(item){
      const li = document.createElement("li");
      const a  = document.createElement("a");
      a.className = "row";
      a.href = item.url;
      a.setAttribute("aria-label", item.tag + ": " + item.label);
      if(!item.url.startsWith("mailto:") && !item.url.startsWith("tel:")){ a.target="_blank"; a.rel="noopener"; }
      const lbl = document.createElement("span");
      lbl.className = "lbl";
      lbl.textContent = item.label;
      a.innerHTML =
        '<span class="icon" aria-hidden="true">'+iconFor(item.tag)+'</span>';
      a.appendChild(lbl);
      a.insertAdjacentHTML("beforeend", '<span class="arrow" aria-hidden="true">→</span>');
      li.appendChild(a);
      list.appendChild(li);
    });

    // vCard download — works offline once the page is open
    const btn = document.getElementById("js-save");
    btn.innerHTML = ICONS.SAVE + '<span>Save contact</span>';
    const v = CARD.vcard || {};
    if(!v.email && !v.phone){ btn.style.display="none"; }
    btn.addEventListener("click", function(){
      const lines = ["BEGIN:VCARD","VERSION:3.0","FN:"+CARD.name];
      if(CARD.title) lines.push("TITLE:"+CARD.title);
      if(CARD.affiliation) lines.push("ORG:"+CARD.affiliation);
      if(v.email) lines.push("EMAIL:"+v.email);
      if(v.phone) lines.push("TEL:"+v.phone);
      (CARD.links||[]).forEach(function(i){
        if(!i.url.startsWith("mailto:") && !i.url.startsWith("tel:")) lines.push("URL:"+i.url);
      });
      lines.push("END:VCARD");
      const blob = new Blob([lines.join("\r\n")], {type:"text/vcard"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = CARD.name.replace(/\s+/g,"_")+".vcf";
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    });
  })();
</script>
</body>
</html>
